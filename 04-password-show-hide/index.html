<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Show / Hide</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="page-wrapper">
    <section class="main-card">
      <header class="header">
        <h1>Password Show / Hide</h1>
        <p>Enter your password and click the eye icon to show or hide it.</p>
      </header>

      <section class="password-card">
        <label for="passwordInput">Password</label>

        <div class="password-field">
          <input
            type="password"
            id="passwordInput"
            value="MySecure123!"
            aria-label="Password"
          />

          <button type="button" id="togglePasswordBtn" class="eye-btn" aria-label="Show password">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5C6.8 5 2.7 8.1 1 12c1.7 3.9 5.8 7 11 7s9.3-3.1 11-7c-1.7-3.9-5.8-7-11-7Zm0 11.5A4.5 4.5 0 1 1 12 7a4.5 4.5 0 0 1 0 9.5Zm0-2A2.5 2.5 0 1 0 12 9a2.5 2.5 0 0 0 0 5.5Z"/>
            </svg>
          </button>
        </div>

        <p class="secure-text">Your password is kept secure.</p>

        <div class="info-box">
          <div class="info-icon">i</div>
          <div>
            <h2>How it works</h2>
            <p>Click on the eye icon to show or hide your password.</p>
          </div>
        </div>
      </section>

      <section class="preview-card">
        <h2>Preview</h2>

        <div class="preview-content">
          <div class="preview-item">
            <p>Hidden (default)</p>

            <div class="mini-password-field">
              <span>••••••••••</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5C6.8 5 2.7 8.1 1 12c1.7 3.9 5.8 7 11 7s9.3-3.1 11-7c-1.7-3.9-5.8-7-11-7Zm0 11.5A4.5 4.5 0 1 1 12 7a4.5 4.5 0 0 1 0 9.5Zm0-2A2.5 2.5 0 1 0 12 9a2.5 2.5 0 0 0 0 5.5Z"/>
              </svg>
            </div>
          </div>

          <div class="divider"></div>

          <div class="preview-item">
            <p>Visible (after click)</p>

            <div class="mini-password-field">
              <span>MySecure123!</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3.3 2 22 20.7 20.7 22l-3.2-3.2A12.8 12.8 0 0 1 12 20C6.8 20 2.7 16.9 1 13c.8-1.8 2.1-3.5 3.7-4.8L2 5.3 3.3 2Zm5.1 8.1a4.4 4.4 0 0 0-.9 2.9A4.5 4.5 0 0 0 12 17.5c1 0 1.9-.3 2.6-.8l-1.8-1.8a2.5 2.5 0 0 1-3.2-3.2l-1.2-1.6ZM12 6c5.2 0 9.3 3.1 11 7-.5 1.2-1.3 2.4-2.3 3.4l-3-3A4.5 4.5 0 0 0 11.6 8.1L9.4 5.9c.8.1 1.7.1 2.6.1Z"/>
              </svg>
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
